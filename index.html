<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bé Vui Học Công Nghệ 3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(135deg, #FFEDD5 0%, #FEF3C7 100%);
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        .btn-3d {
            transition: transform 0.1s, box-shadow 0.1s;
            box-shadow: 0 6px 0 #c2410c;
        }

        .btn-3d:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #c2410c;
        }

        .btn-option {
            transition: all 0.2s;
            box-shadow: 0 4px 0 #d1d5db;
        }

        .btn-option:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #d1d5db;
        }

        .shake {
            animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both;
        }

        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }

        .bounce-in {
            animation: bounceIn 0.5s ease-out;
        }

        @keyframes bounceIn {
            0% { transform: scale(0.3); opacity: 0; }
            50% { transform: scale(1.05); }
            70% { transform: scale(0.9); }
            100% { transform: scale(1); opacity: 1; }
        }

        .progress-bar-fill {
            transition: width 0.5s ease-in-out;
        }
        
        /* Đảm bảo nút trên mobile dễ bấm */
        button { cursor: pointer; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div id="app" class="w-full max-w-2xl bg-white rounded-3xl shadow-2xl p-6 md:p-10 relative overflow-hidden">
        
        <div id="start-screen" class="text-center py-10">
            <div class="text-7xl mb-6">🛠️</div>
            <h1 class="text-3xl md:text-4xl font-black text-orange-600 mb-4">CÔNG NGHỆ LỚP 3</h1>
            <p class="text-gray-600 mb-8 font-bold text-lg px-4">Ôn tập học kì II cùng bé yêu nhé!</p>
            <button id="start-btn" class="btn-3d bg-orange-500 hover:bg-orange-600 text-white text-2xl font-black py-5 px-14 rounded-full w-full md:w-auto">
                CHƠI NGAY 🚀
            </button>
        </div>

        <div id="game-screen" class="hidden">
            <div class="flex justify-between items-center mb-6">
                <div class="flex-1 mr-4">
                    <div class="h-4 bg-gray-200 rounded-full overflow-hidden">
                        <div id="progress-bar" class="progress-bar-fill h-full bg-green-500 w-0"></div>
                    </div>
                </div>
                <span id="question-counter" class="font-black text-orange-500 text-xl">1/10</span>
            </div>

            <div id="rescue-badge" class="hidden bg-red-100 text-red-600 px-4 py-1 rounded-lg text-sm font-bold mb-4 inline-block">
                🆘 VÒNG GIẢI CỨU
            </div>
            <div id="question-container" class="mb-8">
                <h2 id="question-text" class="text-2xl md:text-3xl font-bold text-gray-800 leading-tight">
                    ...
                </h2>
            </div>

            <div id="options-container" class="grid grid-cols-1 gap-4">
                </div>
        </div>

        <div id="rescue-intro" class="hidden text-center bounce-in py-10">
            <div class="text-7xl mb-6">🆘</div>
            <h2 class="text-3xl font-black text-red-500 mb-4">VÒNG GIẢI CỨU!</h2>
            <p class="text-gray-600 mb-8 font-bold text-lg">Bé hãy thử lại những câu chưa đúng nhé!</p>
            <button id="rescue-btn" class="btn-3d bg-red-500 hover:bg-red-600 text-white text-2xl font-black py-5 px-14 rounded-full">
                SẴN SÀNG! 💪
            </button>
        </div>

        <div id="win-screen" class="hidden text-center bounce-in py-10">
            <div class="text-8xl mb-6">🏆</div>
            <h2 class="text-4xl font-black text-green-600 mb-4">XUẤT SẮC!</h2>
            <p id="final-score" class="text-xl text-gray-700 mb-8 font-bold">Bé đã hoàn thành bài ôn tập rồi!</p>
            <button onclick="location.reload()" class="btn-3d bg-green-500 hover:bg-green-600 text-white text-2xl font-black py-5 px-14 rounded-full">
                CHƠI LẠI 🔄
            </button>
        </div>

    </div>

    <script>
        // DỮ LIỆU CÂU HỎI
        const questionsData = [
            { q: "Vật liệu nào thường dùng làm thủ công?", options: ["Giấy màu, hồ dán, kéo ✂️", "Ô tô, đồ chơi 🏎️", "Bàn ghế 🪑"], correct: 0, tts: "Vật liệu nào thường dùng làm thủ công?" },
            { q: "Làm thước kẻ bằng giấy cần chuẩn bị gì?", options: ["Đất nặn 🎨", "Giấy màu, bìa cứng, thước 📏", "Compa ✏️"], correct: 1, tts: "Làm thước kẻ bằng giấy cần chuẩn bị gì?" },
            { q: "Để đồ dùng bền lâu em nên làm gì?", options: ["Vẽ bậy lên 🖍️", "Vứt lung tung 🏠", "Sắp xếp gọn gàng ✨"], correct: 2, tts: "Để đồ dùng bền lâu em nên làm gì?" },
            { q: "Thông điệp '4 Đờ' khi chơi là gì?", options: ["Đúng lúc, chỗ, lượng, cách ✅", "Đẹp, Đắt, Độc, Đỉnh 🌟", "Đùa, Đánh, Đập, Đau ❌"], correct: 0, tts: "Thông điệp bốn đờ khi chơi là gì?" },
            { q: "Cắt dán hình tròn trình tự như thế nào?", options: ["Cắt -> Vẽ -> Dán ✂️", "Vẽ -> Cắt -> Dán 🎨", "Dán -> Cắt -> Vẽ 📐"], correct: 1, tts: "Cắt dán hình tròn trình tự như thế nào?" },
            { q: "Làm thước kẻ giấy gồm mấy bước?", options: ["3 bước", "4 bước", "5 bước"], correct: 1, tts: "Làm thước kẻ giấy gồm mấy bước?" },
            { q: "Biển báo giao thông dùng để làm gì?", options: ["Để trang trí 🏘️", "Chỉ dẫn quy định giao thông 🚦", "Chiếu sáng buổi đêm 🌙"], correct: 1, tts: "Biển báo giao thông dùng để làm gì?" },
            { q: "Biển báo giao thông thường có mấy phần?", options: ["2 phần", "3 phần", "4 phần"], correct: 1, tts: "Biển báo giao thông thường có mấy phần?" },
            { q: "Dụng cụ nào dùng để gắn cột biển báo?", options: ["Dây thừng 🧵", "Nước lọc 💧", "Keo hoặc băng dính 🎞️"], correct: 2, tts: "Dụng cụ nào dùng để gắn cột biển báo?" },
            { q: "Tại sao nên dùng vật liệu tái chế?", options: ["Bảo vệ môi trường 🌍", "Vì nó rẻ 💰", "Vì nhìn lạ mắt ✨"], correct: 0, tts: "Tại sao nên dùng vật liệu tái chế?" }
        ];

        let currentQuestions = [];
        let currentIndex = 0;
        let wrongQuestions = [];
        let isRescueRound = false;
        let audioCtx = null;

        // KHỞI TẠO ÂM THANH (DÀNH CHO iPAD)
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        // TẠO ÂM THANH BẰNG CODE (Không cần file mp3)
        function playSfx(type) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            if (type === 'correct') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(523, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(880, audioCtx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            } else {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(150, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
            }
            osc.start();
            osc.stop(audioCtx.currentTime + 0.3);
        }

        // GIỌNG ĐỌC TTS (Tối ưu cho Safari)
        function speak(text) {
            const cleanText = text.replace(/4Đ/g, "bốn đờ").replace(/\.\.\./g, "gì");
            
            // Cách 1: Thử Google TTS
            const utterance = new Audio(`https://translate.google.com/translate_tts?ie=UTF-8&q=${encodeURIComponent(cleanText)}&tl=vi&client=tw-ob`);
            utterance.play().catch(() => {
                // Cách 2: Nếu bị chặn thì dùng SpeechSynthesis mặc định của iPad
                const msg = new SpeechSynthesisUtterance(cleanText);
                msg.lang = 'vi-VN';
                window.speechSynthesis.speak(msg);
            });
        }

        // ĐIỀU KHIỂN GAME
        function startGame() {
            initAudio(); // Quan trọng nhất để iPad chạy được
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            currentQuestions = [...questionsData].sort(() => Math.random() - 0.5);
            currentIndex = 0;
            wrongQuestions = [];
            isRescueRound = false;
            showQuestion();
        }

        function showQuestion() {
            const q = currentQuestions[currentIndex];
            document.getElementById('question-counter').innerText = `${currentIndex + 1}/${currentQuestions.length}`;
            document.getElementById('progress-bar').style.width = `${(currentIndex / currentQuestions.length) * 100}%`;
            document.getElementById('question-text').innerText = q.q;
            
            const container = document.getElementById('options-container');
            container.innerHTML = '';

            q.options.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = "btn-option bg-white border-2 border-gray-200 hover:border-orange-400 p-5 rounded-2xl text-left font-bold text-gray-700 text-lg flex items-center justify-between";
                btn.innerHTML = `<span>${opt}</span>`;
                btn.onclick = () => checkAnswer(index, btn);
                container.appendChild(btn);
            });

            speak(q.tts);
        }

        function checkAnswer(idx, btn) {
            const q = currentQuestions[currentIndex];
            const btns = document.querySelectorAll('.btn-option');
            btns.forEach(b => b.style.pointerEvents = 'none');

            if (idx === q.correct) {
                btn.classList.add('bg-green-500', 'text-white', 'border-green-600', 'bounce-in');
                playSfx('correct');
                confetti({ particleCount: 40, spread: 50, origin: { y: 0.8 } });
                speak("Đúng rồi bé ơi!");
                setTimeout(next, 1500);
            } else {
                btn.classList.add('bg-red-500', 'text-white', 'border-red-600', 'shake');
                btns[q.correct].classList.add('border-green-500', 'border-4');
                playSfx('wrong');
                speak("Tiếc quá bé ơi!");
                if (!isRescueRound) wrongQuestions.push(q);
                setTimeout(next, 2000);
            }
        }

        function next() {
            currentIndex++;
            if (currentIndex < currentQuestions.length) {
                showQuestion();
            } else {
                if (wrongQuestions.length > 0 && !isRescueRound) {
                    document.getElementById('game-screen').classList.add('hidden');
                    document.getElementById('rescue-intro').classList.remove('hidden');
                    speak("Chúng mình cùng vào vòng giải cứu nhé!");
                } else {
                    showWin();
                }
            }
        }

        function startRescue() {
            initAudio();
            isRescueRound = true;
            currentQuestions = [...wrongQuestions];
            wrongQuestions = [];
            currentIndex = 0;
            document.getElementById('rescue-intro').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            document.getElementById('rescue-badge').classList.remove('hidden');
            showQuestion();
        }

        function showWin() {
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('win-screen').classList.remove('hidden');
            speak("Tuyệt vời, bé đã chiến thắng rồi!");
            const end = Date.now() + 3000;
            (function frame() {
                confetti({ particleCount: 3, angle: 60, spread: 55, origin: { x: 0 } });
                confetti({ particleCount: 3, angle: 120, spread: 55, origin: { x: 1 } });
                if (Date.now() < end) requestAnimationFrame(frame);
            }());
        }

        // GÁN SỰ KIỆN (Dùng cả Click và Touch để iPad nhạy hơn)
        document.getElementById('start-btn').addEventListener('click', startGame);
        document.getElementById('rescue-btn').addEventListener('click', startRescue);
    </script>
</body>
</html>
