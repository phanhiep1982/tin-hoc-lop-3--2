<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bé Vui Học Công Nghệ 3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(135deg, #FFEDD5 0%, #FEF3C7 100%);
            touch-action: manipulation;
        }

        .btn-3d {
            transition: all 0.1s;
            box-shadow: 0 6px 0 #c2410c;
        }

        .btn-3d:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #c2410c;
        }

        .btn-option {
            transition: all 0.2s;
            box-shadow: 0 4px 0 #d1d5db;
        }

        .btn-option:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #d1d5db;
        }

        .shake {
            animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both;
        }

        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }

        .bounce-in {
            animation: bounceIn 0.5s ease-out;
        }

        @keyframes bounceIn {
            0% { transform: scale(0.3); opacity: 0; }
            50% { transform: scale(1.05); }
            70% { transform: scale(0.9); }
            100% { transform: scale(1); opacity: 1; }
        }

        .progress-bar-fill {
            transition: width 0.5s ease-in-out;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div id="app" class="w-full max-w-2xl bg-white rounded-3xl shadow-2xl p-6 md:p-10 relative overflow-hidden">
        
        <div id="start-screen" class="text-center">
            <div class="text-6xl mb-6">🛠️</div>
            <h1 class="text-3xl md:text-4xl font-black text-orange-600 mb-4">CÔNG NGHỆ LỚP 3</h1>
            <p class="text-gray-600 mb-8 font-bold">Bé đã sẵn sàng ôn tập học kì II chưa nào?</p>
            <button onclick="startGame()" class="btn-3d bg-orange-500 hover:bg-orange-600 text-white text-2xl font-black py-4 px-12 rounded-full w-full md:w-auto">
                CHƠI NGAY 🚀
            </button>
        </div>

        <div id="game-screen" class="hidden">
            <div class="flex justify-between items-center mb-6">
                <div class="flex-1 mr-4">
                    <div class="h-4 bg-gray-200 rounded-full overflow-hidden">
                        <div id="progress-bar" class="progress-bar-fill h-full bg-green-500 w-0"></div>
                    </div>
                </div>
                <span id="question-counter" class="font-black text-orange-500">1/10</span>
            </div>

            <div id="rescue-badge" class="hidden bg-red-100 text-red-600 px-3 py-1 rounded-lg text-sm font-bold mb-4 inline-block">
                🆘 VÒNG GIẢI CỨU
            </div>
            <div id="question-container" class="mb-8">
                <h2 id="question-text" class="text-xl md:text-2xl font-bold text-gray-800 leading-tight">
                    Đang tải câu hỏi...
                </h2>
            </div>

            <div id="options-container" class="grid grid-cols-1 gap-4">
                </div>
        </div>

        <div id="rescue-intro" class="hidden text-center bounce-in">
            <div class="text-6xl mb-6">🆘</div>
            <h2 class="text-3xl font-black text-red-500 mb-4">VÒNG GIẢI CỨU!</h2>
            <p class="text-gray-600 mb-8 font-bold">Bé hãy làm lại các câu chưa đúng để chiến thắng nhé!</p>
            <button onclick="startRescueRound()" class="btn-3d bg-red-500 hover:bg-red-600 text-white text-2xl font-black py-4 px-12 rounded-full">
                CỐ GẮNG LÊN! 💪
            </button>
        </div>

        <div id="win-screen" class="hidden text-center bounce-in">
            <div class="text-6xl mb-6">🏆</div>
            <h2 class="text-4xl font-black text-green-600 mb-4">TUYỆT VỜI!</h2>
            <p id="final-score" class="text-xl text-gray-700 mb-8">Bé đã hoàn thành xuất sắc bài ôn tập.</p>
            <button onclick="location.reload()" class="btn-3d bg-green-500 hover:bg-green-600 text-white text-2xl font-black py-4 px-12 rounded-full">
                CHƠI LẠI 🔄
            </button>
        </div>

    </div>

    <script>
        // 1. DỮ LIỆU CÂU HỎI (Dựa trên nội dung PDF)
        const questionsData = [
            {

                ],
                correct: 0,
                tts: "Vật liệu và dụng cụ nào thường dùng để làm thủ công?"
            },
            {
                q: "Khi làm thước kẻ bằng giấy, em cần chuẩn bị gì?",
                options: [
                    "Đất nặn và bút màu 🎨",

                ],
                correct: 1,
                tts: "Khi làm thước kẻ bằng giấy, em cần chuẩn bị gì?"
            },
            {
                q: "Để đồ dùng học tập bền lâu, em nên làm gì?",
                options: [
                    "Vẽ bậy lên đồ dùng 🖍️",
                    "Để bất cứ đâu sau khi dùng 🏠",
                    "Bảo quản và sắp xếp gọn gàng ✨"
                ],
                correct: 2,
                tts: "Để đồ dùng học tập bền lâu, em nên làm gì?"
            },
            {
                q: "Khi chọn vật liệu làm thủ công, tính chất nào là quan trọng nhất?",
                options: [
                    "Phù hợp, an toàn và tận dụng đồ tái chế ♻️",
                    "Càng đắt tiền càng tốt 💰",
                    "Có màu sắc thật đậm 🌈"
                ],
                correct: 0,
                tts: "Khi chọn vật liệu làm thủ công, tính chất nào là quan trọng nhất?"
            },
            {
                q: "Thông điệp '4 Đờ' khi chơi đồ chơi là gì?",
                options: [
                    "Đúng lúc, đúng chỗ, đúng thời lượng, đúng cách ✅",
                    "Đẹp, Độc, Đắt, Đỉnh 🌟",
                    "Đùa nghịch, Đánh nhau, Đập phá, Đau ❌"
                ],
                correct: 0,
                tts: "Thông điệp bốn đờ khi chơi đồ chơi là gì?"
            },
            {
                q: "Các bước cắt dán hình tròn đúng trình tự là?",
                options: [
                    "Cắt -> Vẽ -> Dán ✂️",
                    "Vẽ -> Cắt -> Dán 🎨",
                    "Dán -> Cắt -> Vẽ 📐"
                ],
                correct: 1,
                tts: "Các bước cắt dán hình tròn đúng trình tự là?"
            },
            {
                q: "Vì sao chúng ta nên làm đồ chơi từ vật liệu đã qua sử dụng?",
                options: [
                    "Để bảo vệ môi trường và tiết kiệm 🌍",
                    "Vì nó dễ làm hơn 🛠️",
                    "Vì nhìn nó đẹp hơn 💎"
                ],
                correct: 0,
                tts: "Vì sao chúng ta nên làm đồ chơi từ vật liệu đã qua sử dụng?"
            },
            {
                q: "Để làm được thước kẻ bằng giấy cần thực hiện mấy bước?",
                options: [
                    "3 bước",
                    "4 bước",
                    "5 bước"
                ],
                correct: 1,
                tts: "Để làm được thước kẻ bằng giấy cần thực hiện mấy bước?"
            },
            {
                q: "Biển báo giao thông dùng để làm gì?",
                options: [
                    "Để trang trí đường phố cho đẹp 🏘️",
                    "Chỉ dẫn người tham gia giao thông theo quy định 🚦",
                    "Để đèn tín hiệu chiếu sáng buổi đêm 🌙"
                ],
                correct: 1,
                tts: "Biển báo giao thông dùng để làm gì?"
            },
            {
                q: "Để gắn cột biển báo vào biển báo, em có thể dùng gì?",
                options: [
                    "Dây thừng hoặc kẽm 🧵",
                    "Nước lọc 💧",
                    "Keo dán hoặc băng dính 2 mặt 🎞️"
                ],
                correct: 2,
                tts: "Để gắn cột biển báo vào biển báo, em có thể dùng gì?"
            }
        ];

        // 2. BIẾN TRẠNG THÁI
        let currentQuestions = [];
        let currentIndex = 0;
        let wrongQuestions = [];
        let isRescueRound = false;
        let audioCtx = null;

        // 3. HỆ THỐNG ÂM THANH (Web Audio API)
        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }

        function playSound(type) {
            initAudio();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            if (type === 'correct') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(523.25, audioCtx.currentTime); // C5
                osc.frequency.exponentialRampToValueAtTime(880, audioCtx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.3);
            } else {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(200, audioCtx.currentTime);
                osc.frequency.linearRampToValueAtTime(100, audioCtx.currentTime + 0.2);
                gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.2);
            }
        }

        // 4. HỆ THỐNG GIỌNG ĐỌC (TTS)
        function normalizeText(text) {
            return text
                .replace(/\.\.\./g, ' gì ')
                .replace(/Nh/g, ' Nhờ ')
                .replace(/Gh/g, ' Gờ ')
                .replace(/4Đ/g, ' bốn đờ ')
                .replace(/\?/g, ' hả bé?');
        }

        async function speak(text) {
            const cleanText = normalizeText(text);
            const googleUrl = `https://translate.google.com/translate_tts?ie=UTF-8&q=${encodeURIComponent(cleanText)}&tl=vi&client=tw-ob`;
            
            const audio = new Audio(googleUrl);
            audio.play().catch(() => {
                // Fallback nếu Google TTS bị chặn
                const msg = new SpeechSynthesisUtterance(cleanText);
                msg.lang = 'vi-VN';
                msg.rate = 1;
                window.speechSynthesis.speak(msg);
            });
        }

        // 5. LOGIC GAME
        function startGame() {
            initAudio();
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            currentQuestions = [...questionsData];
            currentIndex = 0;
            wrongQuestions = [];
            isRescueRound = false;
            showQuestion();
        }

        function showQuestion() {
            const question = currentQuestions[currentIndex];
            const qCounter = document.getElementById('question-counter');
            const
